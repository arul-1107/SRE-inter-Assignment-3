events { 
    worker_connections 1024; 
}

http {
    upstream ims_api_cluster {
        # 'api' must match your service name in docker-compose.yml
        server api:8000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://ims_api_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
