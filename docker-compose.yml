services:
  postgres:
    image: postgres:15
    container_name: ims-project-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ims_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ims_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ims-project-redis
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:latest
    container_name: ims-project-kafka
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0

  api:
    # Updated build context to find your requirements.txt and main.py
    build: ./backend/api
    deploy:
      replicas: 3
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://user:password@postgres:5432/ims_db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  lb:
    image: nginx:latest
    container_name: ims-project-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

  ui:
    build: ./frontend
    container_name: ims-project-ui
    ports:
      - "5173:5173"
    depends_on:
      - lb
